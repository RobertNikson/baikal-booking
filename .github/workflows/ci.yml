name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Start stack
        run: docker compose up -d

      - name: Wait for API
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:3200/health >/dev/null; then
              echo "API is up";
              exit 0;
            fi
            sleep 2
          done
          echo "API didn't become healthy in time" >&2
          docker compose logs --no-color || true
          exit 1

      - name: Smoke health
        run: |
          curl -fsS http://127.0.0.1:3200/health

      - name: Print compose logs on failure
        if: failure()
        run: docker compose logs --no-color || true

      - name: Stop stack
        if: always()
        run: docker compose down -v
