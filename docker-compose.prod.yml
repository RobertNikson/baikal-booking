services:
  postgres:
    image: postgres:16-alpine
    container_name: baikal-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: baikal_booking
      POSTGRES_USER: baikal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
    expose:
      - "5432"
    volumes:
      - ./infra/postgres/data:/var/lib/postgresql/data
      - ./infra/postgres/backups:/backups

  redis:
    image: redis:7-alpine
    container_name: baikal-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change_me_redis}"]
    expose:
      - "6379"
    volumes:
      - ./infra/redis/data:/data

  minio:
    image: minio/minio:latest
    container_name: baikal-prod-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio}
    expose:
      - "9000"
      - "9001"
    volumes:
      - ./infra/minio/data:/data

  minio-init:
    image: minio/mc:latest
    container_name: baikal-prod-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-change_me_minio}) do echo '...waiting minio...' && sleep 2; done;
      /usr/bin/mc mb -p local/${MINIO_BUCKET:-baikal-media} || true;
      /usr/bin/mc anonymous set download local/${MINIO_BUCKET:-baikal-media} || true;
      exit 0;
      "

  app:
    image: node:22-alpine
    container_name: baikal-prod-app
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - .env.prod
    command: sh -c "npm ci && npm run start"
    volumes:
      - ./:/app
    ports:
      - "3200:3200"

  backup:
    image: postgres:16-alpine
    container_name: baikal-prod-backup
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
    volumes:
      - ./infra/postgres/backups:/backups
    entrypoint: >
      /bin/sh -c "
      while true; do
        ts=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h postgres -U baikal -d baikal_booking > /backups/baikal_$${ts}.sql;
        find /backups -type f -name '*.sql' -mtime +7 -delete;
        sleep 21600;
      done
      "
